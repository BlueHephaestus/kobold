<!DOCTYPE html>
<html>
<head>
    <title>Kobold - A DM's Assistant (Prototype)</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <h1>🎤 Real-time Speech Transcription</h1>

    <div class="controls">
        <div class="controls-section">
            <button id="startMicBtn" onclick="startMicrophone()">🎙️ Start Microphone</button>
            <button id="stopBtn" onclick="stopTranscription()" disabled>⏹️ Stop</button>
            <input type="file" id="audioFile" accept="audio/wav" class="file-input" onchange="uploadFile(this.files[0])">
            <label for="audioFile" class="file-label">📁 Upload Audio File</label>
        </div>
        <div id="status" class="status disconnected">Disconnected</div>
    </div>
    <div style="display: flex; gap: 20px;">

        <div style="flex: 1;">
            <div id="transcript" class="transcript">
                <div style="color: #999; text-align: center;">Transcript will appear here...</div>
            </div>
        </div>
        <div style="flex: 1">
            <h3>Event Log (Every 5 min)</h3>
            <div id="eventLog"></div>
        </div>
    </div>
    <script src="/static/script.js"></script>

</body>
</html>
